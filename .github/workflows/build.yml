name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-chrome-firefox:
    name: Build Chrome & Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and Zip (Chrome)
        run: npm run zip

      - name: Build and Zip (Firefox)
        run: npm run zip:firefox

      - name: Debug Output
        run: ls -R .output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-firefox-builds
          path: .output/**/*.zip

  build-safari:
    name: Build Safari (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Safari Files
        run: |
          npx wxt build -b safari --debug
          echo "Listing .output directory after build:"
          ls -R .output/

      - name: Convert to Safari Project
        run: |
          if [ ! -d ".output/safari-mv3" ]; then
            echo "Error: .output/safari-mv3 directory was not created. Checking for alternatives..."
            ls -R .output/
            exit 1
          fi
          xcrun safari-web-extension-converter .output/safari-mv3 \
            --project-location .output/safari-project \
            --app-name "Typst QoL" \
            --bundle-identifier "com.dim.typst-qol" \
            --swift \
            --no-open \
            --no-prompt \
            --force

      - name: Zip Safari Project
        run: zip -r .output/safari-xcode-project.zip .output/safari-project

      - name: Upload Safari Artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-build
          path: .output/safari-xcode-project.zip
