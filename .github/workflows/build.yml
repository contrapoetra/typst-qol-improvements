name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-chrome:
    name: Build Chrome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and Zip (Chrome)
        run: npm run zip

      - name: Debug Output
        run: ls -R .output/

      - name: Upload Chrome Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-build
          path: .output/*.zip
          if-no-files-found: error

  build-firefox:
    name: Build Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and Zip (Firefox)
        run: npm run zip:firefox

      - name: Debug Output
        run: ls -R .output/

      - name: Upload Firefox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-build
          path: .output/*.zip
          if-no-files-found: error

  build-safari:
    name: Build Safari (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Safari Files
        run: |
          npx wxt build -b safari --debug
          echo "Listing .output directory after build:"
          ls -R .output/

      - name: Convert to Safari Project
        run: |
          # Detect whether WXT built mv2 or mv3
          SAFARI_DIR=$(ls -d .output/safari-mv* | head -n 1)
          echo "Detected Safari build directory: $SAFARI_DIR"

          if [ -z "$SAFARI_DIR" ]; then
            echo "Error: No safari-mv* directory found in .output/"
            ls -R .output/
            exit 1
          fi

          xcrun safari-web-extension-converter "$SAFARI_DIR" \
            --project-location .output/safari-project \
            --app-name "Typst QoL" \
            --bundle-identifier "com.dim.typst-qol" \
            --swift \
            --no-open \
            --no-prompt \
            --force

      - name: Zip Safari Project
        run: zip -r .output/safari-xcode-project.zip .output/safari-project

      - name: Upload Safari Artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-build
          path: .output/safari-xcode-project.zip
